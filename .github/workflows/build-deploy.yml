name: Build & Deploy Backend

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest # Build still happens on GitHub for speed
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend
        run: |
          cd zarnab-panel-parent
          mvn -B package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: zarnab-application/target/*.jar

  deploy:
    needs: build
    runs-on: self-hosted # <--- This tells it to run on YOUR server
    # Note: If you added a label earlier, use: [self-hosted, zarnab-server]

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifact

      - name: Deploy backend locally
        run: |
          # Move the jar to the correct location
          mkdir -p /var/www/zarnab/backend/zarnab-application/target/
          mv ./artifact/*.jar /var/www/zarnab/backend/zarnab-application/target/app.jar
          
          cd /var/www/zarnab/backend
          
          # Update Docker config from git
          git config --global --add safe.directory /var/www/zarnab/backend
          git pull origin master

          # Run Docker Compose
          cd docker-compose/dev
          docker compose down redis
          docker compose build
          docker compose up -d --remove-orphans
          docker image prune -f